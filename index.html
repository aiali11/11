<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الملفات المؤمنة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f6f9; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* شاشة القفل */
        #lockScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a73e8; display: flex; justify-content: center; align-items: center; z-index: 1000; transition: 0.5s; }
        .pin-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; width: 300px; }
        .pin-box input { width: 100%; padding: 15px; font-size: 24px; text-align: center; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 20px; box-sizing: border-box; }
        .pin-box button { background: #34a853; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* المحتوى الأساسي */
        #mainContent { display: none; width: 100%; max-width: 550px; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); text-align: center; margin-bottom: 25px; }
        h2, h3 { color: #1a73e8; margin-top: 0; }
        input[type="file"] { margin: 15px 0; width: 100%; padding: 10px; border: 2px dashed #ddd; border-radius: 10px; cursor: pointer; box-sizing: border-box; }
        textarea { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; resize: vertical; box-sizing: border-box; margin-bottom: 15px; font-family: inherit; }
        .upload-btn { background-color: #34a853; color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        .text-btn { background-color: #fbbc05; color: #333; margin-top: 10px; }
        
        .file-item { background: white; padding: 18px; margin: 12px 0; border-radius: 15px; border-right: 6px solid #1a73e8; box-shadow: 0 3px 8px rgba(0,0,0,0.04); text-align: right; }
        .preview-img { width: 100%; max-height: 250px; object-fit: contain; border-radius: 10px; margin-bottom: 15px; }
        .file-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-link { text-decoration: none; padding: 8px 15px; border-radius: 6px; font-size: 13px; font-weight: bold; flex: 1; text-align: center; }
        .view-link { background-color: #e8f0fe; color: #1a73e8; }
        .download-link { background-color: #34a853; color: white; }
    </style>
</head>
<body>

<div id="lockScreen">
    <div class="pin-box">
        <h2>🔒 البوابة المؤمنة</h2>
        <input type="password" id="pinInput" placeholder="أدخل الرمز">
        <button id="loginBtn" onclick="checkPin()">دخول</button>
        <p id="errorMsg" style="color:red; margin-top:10px; display:none;">الرمز غير صحيح!</p>
    </div>
</div>

<div id="mainContent">
    <div class="card">
        <h2>رفع الملفات 📁</h2>
        <input type="file" id="fileInput" multiple> 
        <button class="upload-btn" onclick="uploadFiles()">رفع الآن</button>
        <p id="status" style="margin-top:10px; font-weight:bold;"></p>
    </div>

    <div class="card">
        <h3>📝 مسودة النصوص</h3>
        <textarea id="textSnippet" rows="3" placeholder="الصق النص هنا..."></textarea>
        <button class="upload-btn text-btn" onclick="uploadText()">حفظ كملاحظة</button>
    </div>

    <div id="fileDisplay"></div>
</div>

<script>
    const webAppUrl = "ضع_رابط_تطبيق_الويب_هنا"; // ضع رابط الـ exec الخاص بك هنا
    let sessionPin = ""; 

    async function checkPin() {
        const pin = document.getElementById('pinInput').value;
        const btn = document.getElementById('loginBtn');
        btn.innerHTML = "جاري التحقق...";
        
        try {
            const response = await fetch(webAppUrl, {
                method: 'POST',
                body: JSON.stringify({ pin: pin, action: 'loadFiles' })
            });
            const result = await response.json();

            if (result.result === "success") {
                sessionPin = pin;
                document.getElementById('lockScreen').style.display = "none";
                document.getElementById('mainContent').style.display = "block";
                renderFiles(result.files);
            } else {
                document.getElementById('errorMsg').style.display = "block";
            }
        } catch (e) { alert("خطأ في الاتصال بالسحابة"); }
        btn.innerHTML = "دخول";
    }

    async function uploadFiles() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const files = fileInput.files;
        if (files.length === 0) return;

        status.innerHTML = "جاري الرفع... ⏳";
        for (let file of files) {
            const reader = new FileReader();
            await new Promise(r => {
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    await fetch(webAppUrl, { 
                        method: 'POST', 
                        body: JSON.stringify({ pin: sessionPin, action: 'uploadFile', base64: reader.result.split(',')[1], type: file.type, name: file.name }) 
                    });
                    r();
                };
            });
        }
        status.innerHTML = "✅ تم الرفع!";
        fileInput.value = "";
        refresh();
    }

    async function uploadText() {
        const text = document.getElementById('textSnippet').value;
        if (!text.trim()) return;
        await fetch(webAppUrl, { 
            method: 'POST', 
            body: JSON.stringify({ pin: sessionPin, action: 'uploadText', text: text }) 
        });
        document.getElementById('textSnippet').value = "";
        refresh();
    }

    async function refresh() {
        const response = await fetch(webAppUrl, {
            method: 'POST',
            body: JSON.stringify({ pin: sessionPin, action: 'loadFiles' })
        });
        const result = await response.json();
        renderFiles(result.files);
    }

    function renderFiles(files) {
        const display = document.getElementById('fileDisplay');
        display.innerHTML = files.map(f => {
            const isImg = f.mimeType.includes('image');
            const thumb = `https://drive.google.com/thumbnail?id=${f.id}&sz=w600`;
            return `
            <div class="file-item">
                ${isImg ? `<img src="${thumb}" class="preview-img">` : ''}
                <div style="font-weight:bold;">${f.name}</div>
                <div style="font-size:12px; color:#888;">${f.time}</div>
                <div class="file-actions">
                    <a href="${f.url}" target="_blank" class="btn-link view-link">عرض</a>
                    <a href="https://drive.google.com/uc?export=download&id=${f.id}" class="btn-link download-link">تنزيل</a>
                </div>
            </div>`;
        }).join('');
    }
</script>
</body>
</html>
