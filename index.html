<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأنشطة الذكية</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; text-align: center; }
        .upload-btn { background: #34a853; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .batch-actions { display: flex; justify-content: space-between; width: 100%; max-width: 500px; margin-bottom: 10px; }
        .del-selected { background: #ea4335; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 14px; display: none; }
        .file-item { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); width: 100%; }
        .file-item input[type="checkbox"] { margin-left: 15px; transform: scale(1.3); }
        .preview-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-left: 15px; border: 1px solid #eee; }
        .file-info { flex-grow: 1; text-align: right; }
    </style>
</head>
<body>

<div id="lockScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#1a73e8; display:flex; justify-content:center; align-items:center; z-index:1000;">
    <div class="card"><h3>🔒 أدخل الرمز السري</h3><input type="password" id="pinInput" style="padding:10px; text-align:center;"><button onclick="checkPin()" style="margin-top:15px; padding:10px 20px;">دخول</button></div>
</div>

<div id="mainContent" style="display:none; width:100%; max-width:500px;">
    <div class="card">
        <h3>رفع ملفات جديدة</h3>
        <input type="file" id="fileInput" multiple>
        <button class="upload-btn" onclick="uploadFiles()">رفع الآن</button>
    </div>

    <div class="card">
        <h3>مسودة نصوص سريعة</h3>
        <textarea id="textSnippet" rows="3" style="width:100%; border-radius:8px; border:1px solid #ddd;"></textarea>
        <button class="upload-btn" style="background:#fbbc05; color:#333;" onclick="uploadText()">حفظ كملاحظة</button>
    </div>

    <div class="batch-actions">
        <label><input type="checkbox" id="selectAll" onclick="toggleAll()"> تحديد الكل</label>
        <button id="delBtn" class="del-selected" onclick="deleteSelected()">حذف المحدد 🗑️</button>
    </div>

    <div id="fileDisplay"></div>
</div>

<script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbyd8zpXdJT_2RlSxFAEaa7m7jV3EYQkAo5X8tXB1tY1QzmOiMz1xTdUd6x3XuUX_XjUjw/exec";
    let sessionPin = "";
    let currentFiles = [];

    async function checkPin() {
        const pin = document.getElementById('pinInput').value;
        const res = await fetch(webAppUrl, { method: 'POST', body: JSON.stringify({ pin: pin, action: 'loadFiles' }) }).then(r => r.json());
        if (res.result === "success") { sessionPin = pin; document.getElementById('lockScreen').style.display = "none"; document.getElementById('mainContent').style.display = "block"; currentFiles = res.files; renderFiles(); }
        else { alert("خطأ!"); }
    }

    function toggleAll() {
        const checked = document.getElementById('selectAll').checked;
        document.querySelectorAll('.file-check').forEach(c => c.checked = checked);
        updateDelBtn();
    }

    function updateDelBtn() {
        const count = document.querySelectorAll('.file-check:checked').length;
        document.getElementById('delBtn').style.display = count > 0 ? 'block' : 'none';
    }

    async function deleteSelected() {
        if (!confirm("هل أنت متأكد من حذف الملفات المختارة؟")) return;
        const ids = Array.from(document.querySelectorAll('.file-check:checked')).map(c => c.value);
        await fetch(webAppUrl, { method: 'POST', body: JSON.stringify({ pin: sessionPin, action: 'deleteMultiple', ids: ids }) });
        refresh();
    }

    async function uploadFiles() {
        const files = document.getElementById('fileInput').files;
        for (let file of files) {
            const reader = new FileReader();
            await new Promise(r => { reader.readAsDataURL(file); reader.onload = async () => {
                await fetch(webAppUrl, { method: 'POST', body: JSON.stringify({ pin: sessionPin, action: 'uploadFile', base64: reader.result.split(',')[1], type: file.type, name: file.name }) });
                r();
            }; });
        }
        refresh();
    }

    async function uploadText() {
        const text = document.getElementById('textSnippet').value;
        await fetch(webAppUrl, { method: 'POST', body: JSON.stringify({ pin: sessionPin, action: 'uploadText', text: text }) });
        document.getElementById('textSnippet').value = "";
        refresh();
    }

    async function refresh() {
        const res = await fetch(webAppUrl, { method: 'POST', body: JSON.stringify({ pin: sessionPin, action: 'loadFiles' }) }).then(r => r.json());
        currentFiles = res.files;
        renderFiles();
        document.getElementById('selectAll').checked = false;
        updateDelBtn();
    }

    function renderFiles() {
        const display = document.getElementById('fileDisplay');
        display.innerHTML = currentFiles.map(f => {
            const isImg = f.mimeType.includes('image');
            const thumb = `https://drive.google.com/thumbnail?id=${f.id}&sz=w200`;
            return `
            <div class="file-item">
                <input type="checkbox" class="file-check" value="${f.id}" onclick="updateDelBtn()">
                ${isImg ? `<img src="${thumb}" class="preview-img">` : '<div style="width:80px; text-align:center; font-size:30px; margin-left:15px;">📄</div>'}
                <div class="file-info">
                    <div style="font-weight:bold;">${f.name}</div>
                    <div style="font-size:12px; color:#888;">⏰ ${f.time}</div>
                    <a href="${f.url}" target="_blank" style="font-size:13px; color:#1a73e8; text-decoration:none;">عرض الأصل 👁️</a>
                </div>
            </div>`;
        }).join('');
    }
</script>
</body>
</html>
