<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البوابة الذكية - أستاذ علي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f6f9; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; text-align: center; box-sizing: border-box; }
        .upload-btn { background: #34a853; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .batch-actions { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 500px; margin-bottom: 10px; }
        .del-selected { background: #ea4335; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 14px; display: none; }
        
        .file-item { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); width: 100%; border-right: 5px solid #1a73e8; box-sizing: border-box; transition: 0.3s; }
        .file-item input[type="checkbox"] { margin-left: 15px; transform: scale(1.3); cursor: pointer; }
        .preview-img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; margin-left: 15px; border: 1px solid #eee; }
        .file-info { flex-grow: 1; text-align: right; }
        .file-actions { display: flex; gap: 8px; margin-top: 8px; }
        .btn-link { background: #e8f0fe; color: #1a73e8; text-decoration: none; padding: 6px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; }
        
        #textModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="lockScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#1a73e8; display:flex; justify-content:center; align-items:center; z-index:1000;">
    <div class="card">
        <h3 style="color:#1a73e8;">🔒 أدخل الرمز السري</h3>
        <input type="password" id="pinInput" style="padding:12px; text-align:center; width:80%; border-radius:8px; border:1px solid #ccc; font-size:18px;">
        <button onclick="checkPin()" style="margin-top:15px; padding:12px 20px; background:#34a853; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; width:80%;">دخول</button>
    </div>
</div>

<div id="textModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:#1a73e8; margin-top:0;">قراءة الملاحظة</h3>
        <textarea id="modalText" readonly rows="10" style="width:100%; background:#f9f9f9; border-radius:8px; padding:15px; border:1px solid #ddd; box-sizing:border-box; font-family:inherit; resize:vertical;"></textarea>
        <button onclick="closeModal()" style="background:#ea4335; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; width:100%; margin-top:15px; font-weight:bold;">إغلاق النافذة</button>
    </div>
</div>

<div id="mainContent" style="display:none; width:100%; max-width:500px;">
    <div class="card">
        <h3 style="color:#1a73e8; margin-top:0;">رفع ملفات 📁</h3>
        <input type="file" id="fileInput" multiple style="width:100%; padding:10px; border:1px dashed #ccc; border-radius:8px; box-sizing:border-box;">
        <button class="upload-btn" onclick="uploadFiles()">رفع الآن</button>
    </div>

    <div class="card">
        <h3 style="color:#fbbc05; margin-top:0;">مسودة نصوص 📝</h3>
        <textarea id="textSnippet" rows="3" placeholder="الصق أي نص هنا..." style="width:100%; border-radius:8px; border:1px solid #ddd; padding:10px; box-sizing:border-box; font-family:inherit;"></textarea>
        <button class="upload-btn" style="background:#fbbc05; color:#333;" onclick="uploadText()">حفظ كملاحظة</button>
    </div>

    <div class="batch-actions">
        <select id="sortSelect" onchange="renderFiles()" style="padding:8px; border-radius:5px; border:1px solid #ccc;">
            <option value="newest">الأحدث أولاً</option>
            <option value="oldest">الأقدم أولاً</option>
        </select>
        <label style="font-weight:bold; cursor:pointer; background:white; padding:8px 12px; border-radius:5px; box-shadow:0 2px 5px rgba(0,0,0,0.05);"><input type="checkbox" id="selectAll" onclick="toggleAll()"> تحديد الكل</label>
        <button id="delBtn" class="del-selected" onclick="deleteSelected()">حذف المحدد 🗑️</button>
    </div>

    <div id="fileDisplay"></div>
</div>

<script>
    // 🔴🔴🔴 لا تنسَ تحط رابط الـ webApp حقك هنا 🔴🔴🔴
    const webAppUrl = "https://script.google.com/macros/s/AKfycbwAhEMVpBImNw8MbkUMhSc5hmAy2AwNHgBovCVEREnS2vbJvKtODpnO_eqX7rDPzdTq/exec"; 
    
    let sessionPin = "";
    let currentFiles = [];

    function formatBytes(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024, sizes = ['Bytes', 'KB', 'MB', 'GB'], i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    async function checkPin() {
        const pin = document.getElementById('pinInput').value;
        document.querySelector('#lockScreen button').innerText = "جاري التحقق...";
        try {
            const res = await fetch(webAppUrl, { method: 'POST', body: JSON.stringify({ pin: pin, action: 'loadFiles' }) }).then(r => r.json());
            if (res.result === "success") { 
                sessionPin = pin; 
                document.getElementById('lockScreen').style.display = "none"; 
                document.getElementById('mainContent').style.display = "block"; 
                currentFiles = res.files; 
                renderFiles(); 
            } else { alert("الرمز غير صحيح!"); document.querySelector('#lockScreen button').innerText = "دخول"; }
        } catch(e) { alert("خطأ في الاتصال بالخادم."); document.querySelector('#lockScreen button').innerText = "دخول"; }
    }

    function toggleAll() {
        const checked = document.getElementById('selectAll').checked;
        document.querySelectorAll('.file-check').forEach(c => c.checked = checked);
        updateDelBtn();
    }

    function updateDelBtn() {
        const count = document.querySelectorAll('.file-check:checked').length;
        document.getElementById('delBtn').style.display = count > 0 ? 'block' : 'none';
        document.getElementById('delBtn').innerText = `حذف المحدد (${count}) 🗑️`;
    }

    // 🔥 التحديث السحري لدالة الحذف 🔥
    async function deleteSelected() {
        if (!confirm("هل أنت متأكد من الحذف النهائي للملفات المحددة؟")) return;
        
        // 1. جمع الآيديات اللي نبغى نحذفها
        const ids = Array.from(document.querySelectorAll('.file-check:checked')).map(c => c.value);
        
        // 2. إخفاء الملفات من الشاشة فوراً (راحة نفسية)
        currentFiles = currentFiles.filter(f => !ids.includes(f.id));
        renderFiles();
        document.getElementById('selectAll').checked = false;
        updateDelBtn();

        // 3. إرسال أمر الحذف لقوقل في الخلفية بصمت
        fetch(webAppUrl, { method: 'POST', body: JSON.stringify({ pin: sessionPin, action: 'deleteMultiple', ids: ids }) });
    }

    async function uploadFiles() {
        const files = document.getElementById('fileInput').files;
        if(files.length === 0) return;
        document.getElementById('fileDisplay').innerHTML = "<p style='text-align:center;'>جاري الرفع... ⏳</p>";
        for (let file of files) {
            const reader = new FileReader();
            await new Promise(r => { reader.readAsDataURL(file); reader.onload = async () => {
                await fetch(webAppUrl, { method: 'POST', body: JSON.stringify({ pin: sessionPin, action: 'uploadFile', base64: reader.result.split(',')[1], type: file.type, name: file.name }) });
                r();
            }; });
        }
        document.getElementById('fileInput').value = "";
        refresh();
    }

    async function uploadText() {
        const text = document.getElementById('textSnippet').value;
        if(!text.trim()) return;
        document.getElementById('fileDisplay').innerHTML = "<p style='text-align:center;'>جاري الحفظ... ⏳</p>";
        await fetch(webAppUrl, { method: 'POST', body: JSON.stringify({ pin: sessionPin, action: 'uploadText', text: text }) });
        document.getElementById('textSnippet').value = "";
        refresh();
    }

    async function previewText(id, title) {
        document.getElementById('textModal').style.display = 'flex';
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalText').value = "جاري سحب النص من السحابة... ⏳";
        try {
            const res = await fetch(webAppUrl, { method: 'POST', body: JSON.stringify({ pin: sessionPin, action: 'readFile', id: id }) }).then(r => r.json());
            document.getElementById('modalText').value = res.text || "ملف فارغ أو تعذرت القراءة.";
        } catch(e) { document.getElementById('modalText').value = "❌ خطأ في الاتصال بالسحابة."; }
    }

    function closeModal() { document.getElementById('textModal').style.display = 'none'; }

    async function refresh() {
        document.getElementById('fileDisplay').innerHTML = "<p style='text-align:center;'>جاري التحديث... ⏳</p>";
        const res = await fetch(webAppUrl, { method: 'POST', body: JSON.stringify({ pin: sessionPin, action: 'loadFiles' }) }).then(r => r.json());
        currentFiles = res.files;
        renderFiles();
        document.getElementById('selectAll').checked = false;
        updateDelBtn();
    }

    function renderFiles() {
        const display = document.getElementById('fileDisplay');
        if (!currentFiles || currentFiles.length === 0) { display.innerHTML = "<p style='text-align:center; color:#888;'>لا توجد ملفات اليوم. مساحتك نظيفة! ✨</p>"; return; }

        const sortType = document.getElementById('sortSelect').value;
        let sorted = [...currentFiles];
        if (sortType === 'newest') sorted.sort((a, b) => b.timeRaw - a.timeRaw);
        if (sortType === 'oldest') sorted.sort((a, b) => a.timeRaw - b.timeRaw);

        display.innerHTML = sorted.map(f => {
            const isText = f.name.includes('.txt');
            const isImg = f.mimeType && f.mimeType.includes('image');
            const thumb = `https://drive.google.com/thumbnail?id=${f.id}&sz=w200`;
            
            const viewBtn = isText ? `<button class="btn-link" style="background:#fbbc05; color:#333;" onclick="previewText('${f.id}', '${f.name}')">قراءة الملاحظة 📖</button>` : `<a href="${f.url}" target="_blank" class="btn-link">عرض الأصل 👁️</a>`;

            return `
            <div class="file-item" id="file-${f.id}">
                <input type="checkbox" class="file-check" value="${f.id}" onclick="updateDelBtn()">
                ${isImg ? `<img src="${thumb}" class="preview-img">` : '<div style="width:70px; text-align:center; font-size:35px; margin-left:15px; color:#5f6368;">📄</div>'}
                <div class="file-info">
                    <div style="font-weight:bold; color:#333; font-size:14px; word-break: break-all;">${f.name}</div>
                    <div style="font-size:11px; color:#888; margin-top:4px;">⏰ ${f.time} | 📦 ${formatBytes(f.size)}</div>
                    <div class="file-actions">${viewBtn}</div>
                </div>
            </div>`;
        }).join('');
    }
</script>
</body>
</html>
