<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة رفع الملفات - أستاذ علي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .upload-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        h2 { color: #333; }
        input[type="file"] { margin: 20px 0; display: block; width: 100%; }
        button { background-color: #4CAF50; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #45a049; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="upload-container">
    <h2>بوابة رفع الملفات 📁</h2>
    <p>اختر ملف (وورد، بوربوينت، أو صورة) للرفع</p>
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">رفع الملف الآن</button>
    <div id="status"></div>
</div>

<script>
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const file = fileInput.files[0];

        if (!file) {
            alert("فضلاً اختر ملف أولاً!");
            return;
        }

        status.innerHTML = "جاري الرفع إلى قوقل درايف... انتظر ثواني ⏳";
        
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async function () {
            const base64 = reader.result.split(',')[1];
            const data = {
                base64: base64,
                type: file.type,
                name: file.name
            };

            // ضع الرابط الذي نسخته من جوجل سكريبت هنا بين علامتي التنصيص
            const webAppUrl = "https://script.google.com/macros/s/AKfycbzGp9kJKtO89k1p0hTR4MBj2-mvHU-HjqxoQTA8QfkevkdY_wUXPnKoAji0V_EEGw3ewg/exec";

            try {
                const response = await fetch(webAppUrl, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (result.result === "success") {
                    status.innerHTML = "✅ تم الرفع بنجاح! الملف الآن في مجلدك.";
                    fileInput.value = ""; 
                } else {
                    status.innerHTML = "❌ حدث خطأ: " + result.error;
                }
            } catch (error) {
                status.innerHTML = "❌ فشل الاتصال. تأكد من إعدادات النشر.";
                console.error(error);
            }
        };
    }
</script>

</body>
</html>
